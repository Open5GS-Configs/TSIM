- name: Wait for SSH
  hosts: all
  gather_facts: false
  tasks:
    - name: Wait for SSH to become available
      ansible.builtin.wait_for_connection:
        timeout: 300
        sleep: 5

- name: Installation Stage
  hosts: all
  roles:
    - MongoDB Install
    - Open5GS Setup
  vars:
    specific_mongodb_version: "8.0.23"

- name: Configuration Stage
  hosts: all
  roles:
    - Open5GS Config
    - Netplan Config

- name: Testing Stage
  hosts: all
  tasks:
    - name: Check Connectivity 
      ansible.builtin.debug:
        msg: Testing...................
