---
# Copy is used here to avoid the error if the folder already exists and is non empty

- name: Delete config temp dir if it exists
  ansible.builtin.file:
    path: /tmp/open5gs
    state: absent

- name: Create config temp dir 
  ansible.builtin.file:
    path: /tmp/open5gs
    state: directory
    mode: '0755'
  
- name: Copy component configs from path
  ansible.builtin.copy:
    src: "{{ config_path }}"
    dest: /tmp/open5gs
    mode: '0644'
    force: true
  when: use_config_path 

- name: Clone component configs repo
  ansible.builtin.git: 
    repo: "{{ config_repo }}"
    dest: /tmp/open5gs
  when: not use_config_path

- name: Copy configs file
  ansible.builtin.copy:
    src: /tmp/open5gs
    dest: /root/open5gs/install/etc
    remote_src: true
    force: true
  become: yes

- name: Delete hosts temp dir if it exists
  ansible.builtin.file:
    path: /tmp/hosts-repo
    state: absent

- name: Create hosts temp dir 
  ansible.builtin.file:
    path: /tmp/hosts-repo
    state: directory
    mode: '0755'

- name: Copy hosts file from control node
  ansible.builtin.copy:
    src: "{{ hosts_path }}"
    dest: /tmp/hosts-repo/hosts
    mode: '0644'
    force: true
  when: use_hosts_path

- name: Clone hosts file from repo
  ansible.builtin.git: 
    repo: "{{ hosts_repo }}"
    dest: /tmp/hosts-repo/hosts
  when: not use_hosts_path 

- name: Copy hosts file
  ansible.builtin.copy:
    src: /tmp/hosts-repo/hosts
    dest: "/etc/hosts"
    remote_src: true
    force: true
  become: yes

- name: Copy hosts file to template
  ansible.builtin.copy:
    src: /tmp/hosts-repo/hosts
    dest: "/etc/cloud/templates/hosts.debian.tmpl"
    remote_src: true
    force: true
  become: yes
  when: provider == "vultr"

- name: Disable cloud-init hosts management
  ansible.builtin.lineinfile:
    path: /etc/cloud/cloud.cfg
    line: "manage_etc_hosts: false"
    create: yes
  when: provider == "vultr"

- name: Run the log path correction script
  ansible.builtin.script: files/correctLogPath.py
  args:
    executable: python3
  become: yes

- name: Modify ufw rules (INPUT)
  ansible.builtin.command:
    cmd: ufw allow in on enp8s0
  become: yes
  when: provider == "vultr"

- name: Modify ufw rules (OUTPUT)
  ansible.builtin.command:
    cmd: ufw allow out on enp8s0
  become: yes
  when: provider == "vultr"

- name: Configure Network Emulator
  ansible.builtin.shell: >
    tc qdisc add dev eth1 root netem
    {% if netem.delay is defined %}
    delay {{ netem.delay.time }} 
      {% if netem.delay.jitter is defined %}
      {{ netem.delay.jitter }}
      {% endif %} 
      {% if netem.delay.correlation is defined %}
      {{ netem.delay.correlation }}
      {% endif %} 
    {% endif %}
    {% if netem.distribution is defined %}
    distribution {{ netem.distribution }}
    {% endif %}
    {% if netem.loss is defined %}
    loss {{ netem.loss }}
    {% endif %}
    {% if netem.corrupt is defined %}
    corrupt {{ netem.corrupt }}
    {% endif %}
    {% if netem.duplicate is defined %}
    duplicate {{ netem.duplicate }}
    {% endif %}
    {% if netem.rate is defined %}
    rate {{ netem.rate.rate }} 
      {% if netem.rate.packetoverheard is defined %}
      {{ netem.rate.packetoverheard }}
      {% endif %} 
      {% if netem.rate.cellsize is defined %}
      {{ netem.rate.cellsize }}
      {% endif %} 
      {% if netem.rate.celloverhead is defined %}
      {{ netem.rate.celloverhead }}
      {% endif %}
    {% endif %}
  become: yes
  when: (provider == "vb" or provider == "vmware") and use_netem
